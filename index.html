<!doctype html>
<html lang="ko">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>AIM DOJO</title>
		<style>
			* {
				background: none;
				border: none;
				color: inherit;
				padding: 0;
				margin: 0;
			}
			html, body {
				background: #0f1115;
				color: #e6e8ef;
				font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
				font-size: 16px;
				height: 100%;
			}
			body.locked .menu { display: none; }
			body:not(.locked) canvas { filter: blur(4px); }
			canvas {
				display: block;
				height: 100%;
				transition: filter .12s ease;
				width: 100%;
			}
			label {
				color: #9cd2ff;
				font-weight: bold;
			}
			.menu {
				display: grid;
				font-weight: bold;
				left: 50%;
				position: absolute;
				text-align: center;
				top: 50%;
				transform: translate(-50%, -50%);
			}
			.menu button {
				cursor: pointer;
				font-size: 1.5em;
				font-weight: bold;
			}
			.menu button:hover {
				transform: scale(1.25);
				transition: .1s;
			}
			.hud {
				left: 50%;
				pointer-events: none;
				position: absolute;
				top: .5em;
				transform: translateX(-50%);
				white-space: nowrap;
			}
			.logo { font-size: 4em; }
			.sens {
				left: .5em;
				pointer-events: none;
				position: absolute;
				top: .5em;
				white-space: nowrap;
			}
			.sens div { line-height: 1.5em; }
			.sens .game { display: none; }
			.sens .game.active { display: block; }
			.sens .game b { font-size: 1.5em; }
			.sens .hint { opacity: .5; }
			.timer {
				pointer-events: none;
				position: absolute;
				right: .5em;
				top: .5em;
				white-space: nowrap;
			}
			#wrap {
				position: relative;
				height: 100%;
			}
		</style>
	</head>
	<body>
		<div id="wrap">
			<canvas class="blur" id="canvas"></canvas>
			<div class="hud" id="hud">
				<label>Score/Best</label> <span id="best_score">—</span> ·
				<label>Accuracy</label> <span id="accuracy">—</span> % ·
				<label>Critical</label> <span id="crit_rate">—</span> %
			</div>
			<div class="sens" id="sens">
				<span class="hint">(Tab: Next game sens)</span>
				<div class="game active">
					<b>LOL: <label>50</label></b><br>
				</div>
				<div class="game">
					<b>VALORANT</b><br>
					Hipfire: <label id="val_hipfire">—</label><br>
					Spectre/Stinger/Ares/Odin: <span id="val_spectre">—</span><br>
					Vandal/Phantom/Bulldog: <label id="val_vandal">—</label><br>
					Guardian: <span id="val_guardian">—</span><br>
					Marshal/Outlaw: <label id="val_marshal">—</label><br>
					Operator: <span id="val_operator25">—</span> / <span id="val_operator5">—</span>
				</div>
				<div class="game">
					<b>PUBG</b><br>
					FPP(103): <span id="pubg_fpp">—</span><br>
					TPP/ADS/Scope: <label id="pubg_tpp">—</label><br>
					x2: <label id="pubg_x2">—</label><br>
					x3: <label id="pubg_x3">—</label><br>
					x4: <label id="pubg_x4">—</label><br>
					x6: <label id="pubg_x6">—</label><br>
					x8: <label id="pubg_x8">—</label><br>
					x15: <label id="pubg_x15">—</label>
				</div>
				<div class="game">
					<b>OVERWATCH</b><br>
					Hipfire: <label id="ow_hipfire">—</label>%<br>
					Widow/Ana: <label id="ow_widow">—</label>%<br>
					Ashe/Cassidy: <label id="ow_ashe">—</label>%<br>
					Freja: <label id="ow_freja">—</label>%
				</div>
			</div>
			<span id="timer" class="timer">00:00</span>
			<div class="menu" id="menu">
				<label class="logo">AIM DOJO</label><br>
				<button id="flick">Flick</button><br>
				<button id="tracking">Tracking</button><br>
			</div>
		</div>
		<script>
/**
 * @template T
 * @typedef {Readonly<{
 *   [K in keyof T]:
 *     T[K] extends (number | string | symbol)
 *       ? Readonly<T[K]>
 *       : T[K] extends readonly (infer A)[]
 *         ? ReadonlyArray<DeepReadonly<A>>
 *         : DeepReadonly<T[K]>
 * }>} DeepReadonly
 */
;(async () => {
	"use strict"
	const TAU = Math.PI * 2
	const Config = (() => {
		const _ = {
			audio: { volume: .5 },
			crosshair: {
				color: "#00ffff",
				gap: 6,
				length: 12,
				thickness: 1
			},
			grid: { major_every: 5, size: 80 },
			flick: {
				first_dist_mul: 4,
				inactive_alpha: .25,
				num_targets: 12
			},
			hud: { update_interval_ms: 100 },
			impact: {
				alpha: 0.9,
				duration_s: 0.15,
				rings: 2
			},
			ls_keys: {
				flick: "best_flick_score",
				tracking: "best_tracking_score"
			},
			stats: { window_ms: 30_000 },
			target: { base_radius: 5 },
			tracking: {
				base_speed: 0.01,
				impact_interval_s: 0.1,
				move_change_interval_ms: 500,
				size_change_interval_ms: 1_000,
				size_lerp_ms: 100,
				size_steps: [ 1, 2, 3, 4, 5 ],
				speed_lerp_ms: 100,
				speed_steps: [ 1, 1.5, 2 ]
			}
		}
		return /** @type {DeepReadonly<typeof _>} */(_)/**/
	})()
	const State = (() => {
		const declaration = getComputedStyle(document.documentElement)
		return {
			camera: { x: 0, y: 0 },
			device: { height: 0, width: 0 },
			flick: {
				best_score: Number(
					localStorage.getItem(Config.ls_keys.flick) || 0
				),
				/**
				 * @type {{
				 *   cr: number
				 *   cy: number
				 *   r: number
				 *   x: number
				 *   y: number
				 * }[]}
				 */
				targets: []
			},
			game: {
				/** @type {"flick" | "tracking"?} */
				mode: null,
				raf_id: 0
			},
			hud: { next_update_ms: 0 },
			/**
			 * @type {{
			 *   c: boolean
			 *   r: number
			 *   t: number
			 *   x: number
			 *   y: number
			 * }[]}
			 */
			impacts: [],
			input: { mb_left: false },
			stats: {
				shoots: (() => {
					/**
					 * @type {{
					 *   c: boolean
					 *   e: number
					 *   h: boolean
					 *   s: number
					 * }[]}
					 */
					let q = []
					let head = 0
					const THRESH = 2048
					return {
						/** @returns {void} */
						clear() {
							q = []
							head = 0
						},
						/** @returns {void} */
						drop() {
							if (head >= q.length) return
							if (++head > THRESH && head > (q.length >>> 1)) {
								q = q.slice(head)
								head = 0
							}
						},
						/** @returns {typeof q[0]} */
						get first() {
							return /** @type {typeof q[0]} */(head < q.length ? q[head] : void 0)/**/
						},
						/** @returns {number} */
						get length() {
							return q.length - head
						},
						/**
						 * @param {typeof q[0]} v
						 * @returns {void}
						 */
						push(v) {
							q.push(v)
						}
					}
				})(),
				count_crit: 0,
				count_hit: 0,
				count_shoot: 0,
				sum_crit_ms: 0,
				sum_hit_ms: 0,
				sum_shoot_ms: 0
			},
			timer: {
				now_ms: 0,
				now_s: 0,
				prev_ms: 0,
				start_ms: 0
			},
			tracking: {
				best_score: Number(
					localStorage.getItem(Config.ls_keys.tracking) || 0
				),
				move: {
					direction: 0,
					speed: 0,
					direction_change_rate: 0
				},
				next_impact_s: 0,
				next_change_size_ms: 0,
				next_change_move_ms: 0,
				size_lerp: {
					active: false,
					start_ms: 0,
					from: 0,
					to: 0
				},
				speed_lerp: {
					active: false,
					start_ms: 0,
					from: 0,
					to: 0
				},
				target: { cr: 0, cy: 0, r: 0, x: 0, y: 0 }
			}
		}
	})()
	const SFX = await (async () => {
		/** @returns {number} */
		function now() {
			return context.currentTime
		}
		/** @returns {void} */
		function play_crit() {
			const t = now()
			wake(t)
			const src = context.createBufferSource()
			src.buffer = crit_sound
			src.connect(master)
			src.start(t)
		}
		/** @returns {void} */
		function play_hit() {
			const t = now()
			wake(t)
			const src = context.createBufferSource()
			src.buffer = hit_sound
			src.connect(master)
			src.start(t)
		}
		/**
		 * @param {number} t
		 * @returns {void}
		 */
		function wake(t) {
			if (context.state !== "running") context.resume()
			const target = Config.audio.volume
			if (Math.abs(master.gain.value - target) > 1e-3) {
				master.gain.cancelScheduledValues(t)
				master.gain.setTargetAtTime(target, t, 0.01)
			}
		}
		const context = new AudioContext()
		const master = context.createGain()
		master.gain.value = 0
		master.connect(context.destination)
		const [ crit_sound, hit_sound ] = await Promise.all(
			[
				(() => {
					const sr = context.sampleRate
					const duration = 0.25
					const off = new OfflineAudioContext(1, Math.ceil(sr * duration), sr)
					const t0 = 0
					const highpass = off.createBiquadFilter()
					highpass.type = "highpass"
					highpass.frequency.value = 700
					const air = off.createBiquadFilter()
					air.type = "peaking"
					air.frequency.value = 6000
					air.Q.value = 1.0
					air.gain.value = 6
					const shaper = off.createWaveShaper()
					const shaper_curve = new Float32Array(256)
					for (let i = 0; i < 256; i++) {
						const x = i / 128 - 1
						shaper_curve[i] = Math.tanh(2.0 * x)
					}
					shaper.curve = shaper_curve
					shaper.oversample = "2x"
					const mix = off.createGain()
					mix.gain.value = 1.0
					mix.connect(highpass)
					highpass.connect(air)
					air.connect(shaper)
					shaper.connect(off.destination)
					const base_hz = 1600
					const ratio_list = [ 1.00, 2.41, 3.01, 3.77 ]
					const gain_list = [ 0.24, 0.16, 0.11, 0.09 ]
					const total_s = 0.18
					const bell_env = off.createGain()
					bell_env.gain.setValueAtTime(0, t0)
					bell_env.gain.linearRampToValueAtTime(0.85, t0 + 0.002)
					bell_env.gain.exponentialRampToValueAtTime(0.0001, t0 + total_s)
					bell_env.connect(mix)
					for (let i = 0; i < ratio_list.length; i++) {
						const osc = off.createOscillator()
						osc.type = "sine"
						osc.frequency.setValueAtTime(base_hz * ratio_list[i], t0)
						const g = off.createGain()
						g.gain.value = gain_list[i]
						g.gain.exponentialRampToValueAtTime(
							0.0001,
							t0 + (total_s - 0.02) + i * 0.01
						)
						osc.connect(g)
						g.connect(bell_env)
						osc.start(t0)
						osc.stop(t0 + total_s + 0.04)
					}
					const click_len = 0.026
					const click_sharp = 0.9
					const click_body_amt = 0.14
					const click_bandpass_freq = 4800
					const click_q_factor = 2.0 + click_sharp * 0.8
					const click_body_freq = 1500
					const click_gain_mul = 0.55
					const noise_frames = Math.round(sr * Math.min(0.05, click_len))
					const noise_buf = off.createBuffer(1, noise_frames, sr)
					const ch = noise_buf.getChannelData(0)
					for (let i = 0; i < noise_frames; i++) {
						const fade = 1 - i / noise_frames
						ch[i] = (Math.random() * 2 - 1) * fade
					}
					const noise = off.createBufferSource()
					noise.buffer = noise_buf
					const click_highpass = off.createBiquadFilter()
					click_highpass.type = "highpass"
					click_highpass.frequency.value = 250 + click_sharp * 700
					const click_bandpass = off.createBiquadFilter()
					click_bandpass.type = "bandpass"
					click_bandpass.frequency.value = click_bandpass_freq
					click_bandpass.Q.value = click_q_factor
					const pulse = off.createOscillator()
					pulse.type = "square"
					pulse.frequency.value = 2000 + click_sharp * 4200
					const pulse_gain = off.createGain()
					pulse_gain.gain.value = (0.002 + click_sharp * 0.010) * click_gain_mul
					const body = off.createOscillator()
					body.type = "sine"
					body.frequency.value = click_body_freq
					const body_gain = off.createGain()
					body_gain.gain.value = 0.02 * click_body_amt * click_gain_mul
					const click_env = off.createGain()
					click_env.gain.setValueAtTime(1.0, t0)
					click_env.gain.exponentialRampToValueAtTime(
						0.001,
						t0 + Math.max(0.018, click_len)
					)
					click_env.connect(mix)
					noise.connect(click_highpass)
						.connect(click_bandpass)
						.connect(click_env)
					pulse.connect(pulse_gain)
						.connect(click_env)
					body.connect(body_gain)
						.connect(click_env)
					noise.start(t0)
					noise.stop(t0 + Math.min(0.05, click_len))
					pulse.start(t0)
					pulse.stop(t0 + 0.02 + click_sharp * 0.02)
					body.start(t0)
					body.stop(t0 + click_len * 1.1)
					return off.startRendering()
				})(),
				(() => {
					const sr = context.sampleRate
					const duration = 0.08
					const off = new OfflineAudioContext(1, Math.ceil(sr * duration), sr)
					const t0 = 0
					const len = 0.035
					const sharp = 0.8
					const body_amt = 0.55
					const bp_freq = 1400
					const q_factor = 0.8 + sharp * 1.5
					const body_freq = 320
					const noise_len = Math.round(sr * 0.03)
					const noise_buf = off.createBuffer(1, noise_len, sr)
					const ch = noise_buf.getChannelData(0)
					for (let i = 0; i < noise_len; i++) {
						ch[i] = (Math.random() * 2 - 1) * (1 - i / noise_len)
					}
					const noise = off.createBufferSource()
					noise.buffer = noise_buf
					const pulse = off.createOscillator()
					pulse.type = "square"
					pulse.frequency.value = 2000 + sharp * 4000
					const pulse_gain = off.createGain()
					pulse_gain.gain.value = (0.002 + sharp * 0.01)
					const body = off.createOscillator()
					body.type = "sine"
					body.frequency.value = body_freq
					const body_gain = off.createGain()
					body_gain.gain.value = 0.02 * body_amt
					const highpass = off.createBiquadFilter()
					highpass.type = "highpass"
					highpass.frequency.value = 250 + sharp * 600
					const bandpass = off.createBiquadFilter()
					bandpass.type = "bandpass"
					bandpass.frequency.value = bp_freq
					bandpass.Q.value = q_factor
					const env = off.createGain()
					env.gain.setValueAtTime(1.0, t0)
					env.gain.exponentialRampToValueAtTime(0.001, t0 + Math.max(0.02, len))
					const shaper = off.createWaveShaper()
					const curve = new Float32Array(256)
					for (let i = 0; i < 256; i++) {
						const x = i / 128 - 1
						curve[i] = Math.tanh(2.2 * x)
					}
					shaper.curve = curve
					shaper.oversample = "2x"
					noise.connect(highpass)
						.connect(bandpass)
						.connect(env)
					pulse.connect(pulse_gain)
						.connect(env)
					body.connect(body_gain)
						.connect(env)
					env.connect(shaper)
						.connect(off.destination)
					noise.start(t0)
					noise.stop(t0 + Math.min(0.06, len))
					pulse.start(t0)
					pulse.stop(t0 + 0.02 + sharp * 0.02)
					body.start(t0)
					body.stop(t0 + len * 1.2)
					return off.startRendering()
				})()
			]
		)
		return { now, play_crit, play_hit }
	})()
	const Renderer = (() => {
		/** @returns {void} */
		function draw() {
			const { height, width } = State.device
			context.save()
			context.clearRect(0, 0, width, height)
			context.translate(
				Math.round(width / 2),
				Math.round(height / 2)
			)
			draw_grid()
			if (State.game.mode) {
				draw_paths()
				draw_targets()
				draw_pulses()
				draw_crosshair()
			}
			context.restore()
		}
		/** @returns {void} */
		function draw_crosshair() {
			const { color, gap, length, thickness } = Config.crosshair
			context.save()
			context.fillStyle = color
			context.fillRect(
				-thickness,
				-gap / 2 - length,
				thickness * 2,
				length
			)
			context.fillRect(
				-thickness,
				gap / 2,
				thickness * 2,
				length
			)
			context.fillRect(
				-gap / 2 - length,
				-thickness,
				length,
				thickness * 2
			)
			context.fillRect(
				gap / 2,
				-thickness,
				length,
				thickness * 2
			)
			context.restore()
		}
		/** @returns {void} */
		function draw_paths() {
			const { camera } = State
			const { mode } = State.game
			context.save()
			context.translate(-camera.x, -camera.y)
			context.globalAlpha = 0.4
			context.lineWidth = 2
			context.strokeStyle = "white"
			context.beginPath()
			context.moveTo(camera.x, camera.y)
			if (mode == "flick") {
				const { targets } = State.flick
				for (let i = targets.length - 1; i >= 0; i--) {
					const { cy, x } = targets[i]
					context.lineTo(x, cy)
				}
			} else if (mode == "tracking") {
				const { cy, x } = State.tracking.target
				context.lineTo(x, cy)
			}
			context.stroke()
			context.restore()
		}
		/** @returns {void} */
		function draw_grid() {
			const { x, y } = State.camera
			context.save()
			context.translate(-x, -y)
			context.fillStyle = grid_pattern
			context.fillRect(
				x - State.device.width / 2,
				y - State.device.height / 2,
				State.device.width,
				State.device.height
			)
			context.restore()
		}
		/** @returns {void} */
		function draw_pulses() {
			if (!State.impacts.length) return
			const { alpha, duration_s, rings } = Config.impact
			const { camera } = State
			const now_s = SFX.now()
			const spacing = 0.4
			context.save()
			context.translate(-camera.x, -camera.y)
			context.lineWidth = 2
			context.globalCompositeOperation = "lighter"
			for (let i = State.impacts.length - 1; i >= 0; i--) {
				const { c, r, t, x, y } = State.impacts[i]
				const tt = now_s - t
				if (tt > duration_s + spacing * (rings - 1)) {
					State.impacts.splice(i, 1)
					continue
				}
				if (tt < 0) continue
				const prog = tt / duration_s
				const base = c ? "red" : "white"
				const dot_alpha = Math.max(0, 0.9 * (1 - Math.min(1, prog)))
				if (dot_alpha > 0) {
					context.globalAlpha = dot_alpha
					context.fillStyle = base
					context.beginPath()
					context.arc(x, y, 2, 0, TAU)
					context.fill()
				}
				for (let k = 0; k < rings; k++) {
					const p2 = prog - k * spacing
					if (p2 <= 0 || p2 > 1) continue
					const pr = r * p2
					const ring_alpha = alpha * (1 - p2)
					if (ring_alpha <= 0 || pr <= 0) continue
					context.globalAlpha = ring_alpha
					context.strokeStyle = base
					context.beginPath()
					context.arc(x, y, pr, 0, TAU)
					context.stroke()
				}
			}
			context.restore()
		}
		/**
		 * @param {typeof State.flick.targets[0]} target
		 * @param {number} alpha
		 * @returns {void}
		 */
		function draw_target(target, alpha) {
			const { cr, cy, r, x, y } = target
			const { camera } = State
			const line_width = 1.5
			context.save()
			context.globalAlpha = alpha
			context.lineWidth = line_width
			context.translate(-camera.x, -camera.y)
			context.strokeStyle = "red"
			context.beginPath()
			context.arc(x, y, r + line_width, 0, TAU)
			context.stroke()
			context.fillStyle = "#385978"
			context.beginPath()
			context.arc(x, y, r, 0, TAU)
			context.fill()
			context.strokeStyle = "red"
			context.beginPath()
			context.arc(x, cy, cr + line_width, 0, TAU)
			context.stroke()
			context.fillStyle = "#1c344a"
			context.beginPath()
			context.arc(x, cy, cr, 0, TAU)
			context.fill()
			context.restore()
		}
		/** @returns {void} */
		function draw_targets() {
			if (State.game.mode == "flick") {
				const { targets } = State.flick
				for (let i = 0; i + 1 < targets.length; i++) {
					draw_target(
						targets[i],

	const Logic = (() => {
		/**
		 * @param {number} r
		 * @returns {number}
		 */
		function calc_core_radius(r) {
			return Math.max(
				r / 3,
				Config.target.base_radius / 2
			)
		}
		/**
		 * @param {number} n
		 * @returns {number}
		 */
		function clamp_01(n) {
			return n < 0 ? 0 : n > 1 ? 1 : n
		}
		/**
		 * @param {number} a
		 * @param {number} b
		 * @param {number} t
		 * @returns {number}
		 */
		function linear_interpolate(a, b, t) {
			return a + (b - a) * t
		}
		/**
		 * @param {number} now_ms
		 * @returns {void}
		 */
		function on_frame(now_ms) {
			const { stats, timer } = State
			const { mode } = State.game
			const { shoots } = stats
			timer.prev_ms = timer.now_ms
			timer.now_ms = now_ms
			timer.now_s = SFX.now()
			const window_ms = now_ms - Config.stats.window_ms
			while (shoots.length) {
				const { first } = shoots
				const { c, e, h, s } = first
				if (window_ms >= e) {
					const ms = e - s
					stats.count_shoot--
					stats.sum_shoot_ms -= ms
					if (h) {
						stats.count_hit--
						stats.sum_hit_ms -= ms
						if (c) {
							stats.count_crit--
							stats.sum_crit_ms -= ms
						}
					}
					shoots.drop()
				} else if (window_ms >= s) {
					const ms = window_ms - s
					stats.sum_shoot_ms -= ms
					if (h) {
						stats.sum_hit_ms -= ms
						if (c) {
							stats.sum_crit_ms -= ms
						}
					}
					first.s = window_ms
					break
				} else {
					break
				}
			}
			if (mode == "flick") {
				if (!State.flick.targets.length) {
					const { base_radius } = Config.target
					const { num_targets } = Config.flick
					const { targets } = State.flick
					const base_d = Config.flick.first_dist_mul * base_radius
					let { x, y } = State.camera
					let i = 1
					while (i <= num_targets) {
						const theta = Math.random() * TAU
						const dist = base_d * i
						x += Math.cos(theta) * dist
						y += Math.sin(theta) * dist
						const r = base_radius * Math.sqrt(i)
						const cr = calc_core_radius(r)
						const cy = y - r + cr
						targets[num_targets - i++] = { cr, cy, x, y, r }
					}
				}
			} else if (mode == "tracking") {
				const { base_radius } = Config.target
				const {
					base_speed,
					size_lerp_ms,
					size_steps,
					speed_lerp_ms,
					speed_steps
				} = Config.tracking
				const { tracking } = State
				const { move, size_lerp, speed_lerp, target } = tracking
				if (State.input.mb_left) {
					const speed = target.r * move.speed * move.direction
					target.x += speed * (now_ms - timer.prev_ms)
					if (speed_lerp.active) {
						const p = clamp_01(
							(now_ms - speed_lerp.start_ms) / speed_lerp_ms
						)
						if (p == 1) {
							speed_lerp.active = false
							move.speed = speed_lerp.to
						} else {
							move.speed = linear_interpolate(speed_lerp.from, speed_lerp.to, p)
						}
					} else if (now_ms >= tracking.next_change_move_ms) {
						if (Math.random() < (move.direction_change_rate += 0.2)) {
							move.direction *= -1
							move.direction_change_rate = 0
						}
						const index = Math.random() * speed_steps.length | 0
						speed_lerp.active = true
						speed_lerp.from = move.speed
						speed_lerp.start_ms = now_ms
						speed_lerp.to = base_speed * speed_steps[index]
						tracking.next_change_move_ms = now_ms + Config.tracking.move_change_interval_ms
					}
					if (size_lerp.active) {
						const p = clamp_01(
							(now_ms - size_lerp.start_ms) / size_lerp_ms
						)
						if (p == 1) {
							size_lerp.active = false
							target.r = size_lerp.to
						} else {
							target.r = linear_interpolate(size_lerp.from, size_lerp.to, p)
						}
						target.cr = calc_core_radius(target.r)
						target.cy = target.y - target.r + target.cr
					} else if (now_ms >= tracking.next_change_size_ms) {
						const index = Math.random() * size_steps.length | 0
						size_lerp.active = true
						size_lerp.from = target.r
						size_lerp.start_ms = now_ms
						size_lerp.to = base_radius * size_steps[index]
						tracking.next_change_size_ms = now_ms + Config.tracking.size_change_interval_ms
					}
					shoot()
				}
			} else {
				throw Error()
			}
			Renderer.draw()
			if (now_ms >= State.hud.next_update_ms) {
				State.hud.next_update_ms = now_ms + Config.hud.update_interval_ms
				HUD.update_hud()
			}
			State.game.raf_id = requestAnimationFrame(on_frame)
		}
		/** @returns {void} */
		function shoot() {
			const { stats, tracking } = State
			const { x: x2, y: y2 } = State.camera
			const { now_ms, now_s, prev_ms } = State.timer
			const { mode } = State.game
			let is_hit = false
			let is_crit = false
			if (mode == "flick") {
				const { targets } = State.flick
				const { cr, cy, r, x, y } = targets[targets.length - 1]
				const dx = x - x2
				is_hit = dx ** 2 + (y - y2) ** 2 <= r * r
				is_crit = dx ** 2 + (cy - y2) ** 2 <= cr * cr
				if (is_hit) {
					if (is_crit) {
						SFX.play_crit()
					} else {
						SFX.play_hit()
					}
					State.impacts.push(
						{ c: is_crit, r, x: x2, y: y2, t: now_s }
					)
					targets.length--
				}
			} else if (mode == "tracking") {
				const { cr, cy, r, x, y } = tracking.target
				const dx = x - x2
				is_hit = dx ** 2 + (y - y2) ** 2 <= r * r
				is_crit = dx ** 2 + (cy - y2) ** 2 <= cr * cr
				if (is_hit && now_s >= tracking.next_impact_s) {
					if (is_crit) {
						SFX.play_crit()
					} else {
						SFX.play_hit()
					}
					State.impacts.push(
						{ c: is_crit, r, x: x2, y: y2, t: now_s }
					)
					tracking.next_impact_s = now_s + Config.tracking.impact_interval_s
				}
			} else {
				throw Error()
			}
			stats.shoots.push(
				{
					c: is_crit,
					e: now_ms,
					h: is_hit,
					s: prev_ms
				}
			)
			stats.count_shoot++
			stats.sum_shoot_ms += now_ms - prev_ms
			if (is_hit) {
				stats.count_hit++
				stats.sum_hit_ms += now_ms - prev_ms
				if (is_crit) {
					stats.count_crit++
					stats.sum_crit_ms += now_ms - prev_ms
				}
			}
		}
		/**
		 * @param {"flick" | "tracking"} type
		 * @returns {void}
		 */
		function start_game(type) {
			try {
				document.body.requestPointerLock({ unadjustedMovement: true })
				document.body.requestFullscreen()
			} catch {
				document.exitPointerLock()
				return
			}
			State.camera.x = 0
			State.camera.y = 0
			State.game.mode = type
			State.game.raf_id = requestAnimationFrame(on_frame)
			const now_ms = State.timer.now_ms = State.timer.start_ms = performance.now()
			if (type == "flick") {
				const { flick } = State
				flick.targets = []
			} else if (type == "tracking") {
				const {
					move_change_interval_ms,
					size_change_interval_ms
				} = Config.tracking
				const { tracking } = State
				const { move, target } = tracking
				tracking.next_impact_s = 0
				tracking.next_change_size_ms = now_ms + size_change_interval_ms
				tracking.next_change_move_ms = now_ms + move_change_interval_ms
				move.direction_change_rate = 0
				move.direction = Math.random() < .5 ? 1 : -1
				move.speed = Config.tracking.base_speed
				target.r = Config.target.base_radius
				target.x = 0
				target.y = 0
				target.cr = calc_core_radius(target.r)
				target.cy = -target.r + target.cr
			} else {
				throw Error()
			}
		}
		/** @returns {void} */
		function stop_game() {
			const { stats } = State
			stats.count_crit = 0
			stats.count_hit = 0
			stats.count_shoot = 0
			State.game.mode = null
			State.input.mb_left = false
			stats.shoots.clear()
			stats.sum_crit_ms = 0
			stats.sum_hit_ms = 0
			stats.sum_shoot_ms = 0
			cancelAnimationFrame(State.game.raf_id)
		}
		return {
			on_frame,
			shoot,
			start_game,
			stop_game
		}
	})()
	/* Controller */{
		/**
		 * @param {MouseEvent} ev
		 * @returns {void}
		 */
		function on_click(ev) {
			if (ev.target == flick_btn) {
				Logic.start_game("flick")
			} else if (ev.target == tracking_btn) {
				Logic.start_game("tracking")
			} else {
				throw Error()
			}
		}
		/**
		 * @param {KeyboardEvent} ev
		 * @returns {void}
		 */
		function on_keydown(ev) {
			if (ev.code == "Tab") {
				ev.preventDefault()
				HUD.cycle_active_game_sens()
			}
		}
		/** @returns {void} */
		function on_pointercancel() {
			if (State.game.mode) {
				State.input.mb_left = false
			}
		}
		/**
		 * @param {MouseEvent} ev
		 * @returns {void}
		 */
		function on_pointerdown(ev) {
			if (ev.button == 0 && State.game.mode) {
				State.input.mb_left = true
				Logic.shoot()
			}
		}
		/**
		 * @param {MouseEvent} ev
		 * @returns {void}
		 */
		function on_pointermove(ev) {
			if (State.game.mode) {
				State.camera.x += ev.movementX
				State.camera.y += ev.movementY
			}
		}
		/**
		 * @param {MouseEvent} ev
		 * @returns {void}
		 */
		function on_pointerup(ev) {
			if (ev.button == 0 && State.game.mode) {
				State.input.mb_left = false
			}
		}
		/** @returns {void} */
		function on_pointerlockchange() {
			if (document.pointerLockElement) {
				document.body.classList.add("locked")
			} else {
				document.body.classList.remove("locked")
				if (State.game.mode) {
					Logic.stop_game()
				}
			}
		}
		/** @returns {void} */
		function on_resize() {
			Renderer.resize()
			HUD.update_game_sens()
		}
		const flick_btn = /** @type {HTMLButtonElement} */(document.getElementById("flick"))/**/
		const tracking_btn = /** @type {HTMLButtonElement} */(document.getElementById("tracking"))/**/
		addEventListener(
			"resize",
			on_resize,
			{ passive: true }
		)
		document.addEventListener("fullscreenchange", on_resize)
		document.addEventListener("keydown", on_keydown)
		document.addEventListener(
			"pointercancel",
			on_pointercancel
		)
		document.addEventListener("pointerdown", on_pointerdown)
		document.addEventListener(
			"pointerlockchange",
			on_pointerlockchange
		)
		document.addEventListener(
			"pointermove",
			on_pointermove,
			{ passive: true }
		)
		document.addEventListener("pointerup", on_pointerup)
		flick_btn.addEventListener("click", on_click)
		tracking_btn.addEventListener("click", on_click)
		on_resize()
	}
})()
		</script>
	</body>
</html>
